name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        env:
          SESSION_STORE: memory
          CLINIC_TIMEZONE: Asia/Singapore
        run: pytest -q

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build Next.js
        env:
          # Clerk validates publishable key shape (base64 frontendApi ending in $ with a dot).
          # Placeholder is fine for CI prerender — real keys live in Vercel / local .env.
          # Do not set a fake sk_test_* here: GitHub secret scanning treats it as Stripe.
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ZXhhbXBsZS5jbGVyay5hY2NvdW50cy5kZXYk
        run: npm run build
