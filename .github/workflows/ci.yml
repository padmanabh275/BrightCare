name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        env:
          SESSION_STORE: memory
          CLINIC_TIMEZONE: Asia/Singapore
        run: pytest -q

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build Next.js
        env:
          # Clerk requires keys at build time (layout wraps pages in ClerkProvider).
          # Placeholders are fine for CI — real keys live in Vercel / local .env.
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_Y2ktYnVpbGQtcGxhY2Vob2xkZXIk
          CLERK_SECRET_KEY: sk_test_ci_build_placeholder_not_a_real_secret
        run: npm run build
